# Reverse proxy para el Agente Ganadero (Streamlit en 127.0.0.1:8501)
# Instalar en: /etc/nginx/sites-available/alura-agente
# Activar con: ln -s /etc/nginx/sites-available/alura-agente /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;

    # Tamanio maximo de subida (util si luego se permite cargar CSV)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Headers de WebSocket: Streamlit los requiere para su canal
        # de comunicacion; sin ellos la pagina carga en blanco
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers estandar de reverse proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mantener viva la conexion WebSocket de Streamlit
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Desactivar buffering para que el streaming de respuestas fluya
        proxy_buffering off;
    }
}
